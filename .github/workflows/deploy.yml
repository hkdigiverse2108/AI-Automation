name: Deploy AI Automation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build Frontend in Runner
        run: |
          cd frontend
          npm ci
          NEXT_TELEMETRY_DISABLED=1 npm run build
          cd ..
          if [ -d "frontend/public" ]; then
            tar -czf frontend-build.tar.gz -C frontend .next public package.json package-lock.json
          else
            tar -czf frontend-build.tar.gz -C frontend .next package.json package-lock.json
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 82.29.160.246 >> ~/.ssh/known_hosts

      - name: Upload Frontend Build to Server
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 frontend-build.tar.gz root@82.29.160.246:/root/AI-Automation/dev/

      - name: Deploy LIVE on Server
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 root@82.29.160.246 << 'EOF'
            set -e
            cd /root/AI-Automation/dev

            # Fetch latest remote changes
            git fetch origin

            # Identify which directories have changes before pulling
            PREV_COMMIT=$(git rev-parse HEAD || echo "")
            
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            ROOT_CHANGED=true

            if [ -n "$PREV_COMMIT" ]; then
              if git diff --name-only "$PREV_COMMIT" origin/main > /dev/null 2>&1; then
                # Check if backend directory has changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -E '^backend/' > /dev/null; then
                  BACKEND_CHANGED=true
                else
                  BACKEND_CHANGED=false
                fi

                # Check if frontend directory has changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -E '^frontend/' > /dev/null; then
                  FRONTEND_CHANGED=true
                else
                  FRONTEND_CHANGED=false
                fi

                # Check if root directory files (outside backend/ and frontend/) have changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -v -E '^(backend/|frontend/)' > /dev/null; then
                  ROOT_CHANGED=true
                else
                  ROOT_CHANGED=false
                fi
              fi
            fi

            echo "=== CHANGE ANALYSIS ==="
            echo "Backend Changed:  $BACKEND_CHANGED"
            echo "Frontend Changed: $FRONTEND_CHANGED"
            echo "Root Changed:     $ROOT_CHANGED"
            echo "======================="

            # Checkout and pull the latest code
            git checkout main
            git pull origin main

            # Extract the pre-built frontend files (overwriting .next, public, package.json)
            echo "Extracting frontend build..."
            tar -xzf frontend-build.tar.gz -C frontend && rm -f frontend-build.tar.gz || { rm -f frontend-build.tar.gz; exit 1; }

            # 1. Handle Root Changes (If root files like package.json change)
            if [ "$ROOT_CHANGED" = "true" ]; then
              echo "Root files changed. Running npm install in root workspace..."
              npm install
            fi

            # 2. Handle Backend Changes
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$ROOT_CHANGED" = "true" ]; then
              echo "Deploying Backend changes..."
              npm install --prefix backend
              pm2 restart AI-Automation-Backend
            else
              echo "No Backend changes detected. Skipping Backend deployment."
            fi

            # 3. Handle Frontend Changes (Pre-built on runner, only install runtime production deps and restart)
            if [ "$FRONTEND_CHANGED" = "true" ] || [ "$ROOT_CHANGED" = "true" ]; then
              echo "Deploying Frontend changes..."
              npm install --prefix frontend --omit=dev
              pm2 restart AI-Automation-FE
            else
              echo "No Frontend changes detected. Skipping Frontend deployment."
            fi
          EOF

      - name: Clean up failed upload on Server
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 root@82.29.160.246 "rm -f /root/AI-Automation/dev/frontend-build.tar.gz"
