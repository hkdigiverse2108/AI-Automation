name: Deploy AI Automation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 82.29.160.246 >> ~/.ssh/known_hosts

      - name: Deploy LIVE
        run: |
          ssh root@82.29.160.246 << 'EOF'
            set -e
            cd /root/AI-Automation/dev

            # Safe function to kill processes on a port without killing PM2 daemon
            safe_kill_port() {
              local port=$1
              echo "Checking port $port..."
              local pids=""
              if command -v lsof >/dev/null 2>&1; then
                pids=$(lsof -t -i :$port 2>/dev/null || true)
              elif command -v fuser >/dev/null 2>&1; then
                pids=$(fuser $port/tcp 2>/dev/null || true)
              fi
              
              if [ -z "$pids" ]; then
                echo "No processes found on port $port."
                return 0
              fi
              
              for pid in $pids; do
                local cmd=""
                if [ -r /proc/$pid/cmdline ]; then
                  cmd=$(cat /proc/$pid/cmdline | tr '\0' ' ' 2>/dev/null || true)
                else
                  cmd=$(ps -p $pid -o cmd= 2>/dev/null || true)
                fi
                
                if echo "$cmd" | grep -qE "pm2:|Daemon.js|God Daemon"; then
                  echo "Skipping PM2 daemon (PID: $pid, Command: $cmd) on port $port"
                else
                  echo "Killing process on port $port (PID: $pid, Command: $cmd)"
                  kill -9 $pid || true
                fi
              done
            }

            # Fetch latest remote changes
            git fetch origin

            # Identify which directories have changes before pulling
            PREV_COMMIT=$(git rev-parse HEAD || echo "")
            
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            ROOT_CHANGED=true

            if [ -n "$PREV_COMMIT" ]; then
              if git diff --name-only "$PREV_COMMIT" origin/main > /dev/null 2>&1; then
                # Check if backend directory has changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -E '^backend/' > /dev/null; then
                  BACKEND_CHANGED=true
                else
                  BACKEND_CHANGED=false
                fi

                # Check if frontend directory has changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -E '^frontend/' > /dev/null; then
                  FRONTEND_CHANGED=true
                else
                  FRONTEND_CHANGED=false
                fi

                # Check if root directory files (outside backend/ and frontend/) have changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -v -E '^(backend/|frontend/)' > /dev/null; then
                  ROOT_CHANGED=true
                else
                  ROOT_CHANGED=false
                fi
              fi
            fi

            echo "=== CHANGE ANALYSIS ==="
            echo "Backend Changed:  $BACKEND_CHANGED"
            echo "Frontend Changed: $FRONTEND_CHANGED"
            echo "Root Changed:     $ROOT_CHANGED"
            echo "======================="

            # Checkout and pull the latest code
            git checkout main
            git pull origin main

            # 1. Handle Root Changes (If root files like package.json change)
            if [ "$ROOT_CHANGED" = "true" ]; then
              echo "Root files changed. Running npm install in root workspace..."
              npm install
            fi

            # 2. Handle Backend Changes
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$ROOT_CHANGED" = "true" ]; then
              echo "Deploying Backend changes..."
              npm install --prefix backend
              pm2 delete AI-Automation-Backend || true
              pm2 delete AI-Automation-Worker || true
              safe_kill_port 5000
              safe_kill_port 5001
              pm2 start ecosystem.config.js --only AI-Automation-Backend,AI-Automation-Worker
            else
              echo "No Backend changes detected. Skipping Backend deployment."
            fi

            # 3. Handle Frontend Changes
            if [ "$FRONTEND_CHANGED" = "true" ] || [ "$ROOT_CHANGED" = "true" ]; then
              echo "Deploying Frontend changes..."
              npm install --prefix frontend
              # Clean Next.js cache and previous build to prevent stale cache reuse
              rm -rf frontend/.next
              npm run build --prefix frontend
              pm2 delete AI-Automation-FE || true
              safe_kill_port 3000
              pm2 start ecosystem.config.js --only AI-Automation-FE
              
              # Clear Nginx reverse proxy cache if enabled and reload Nginx
              echo "Clearing Nginx cache..."
              rm -rf /var/cache/nginx/* || true
              systemctl reload nginx || service nginx reload || true
            else
              echo "No Frontend changes detected. Skipping Frontend deployment."
            fi
          EOF
