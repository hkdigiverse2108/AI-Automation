name: Deploy AI Automation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build Frontend in Runner
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api-automation.hkdigiverse.com' }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
        run: |
          cd frontend
          npm ci
          NEXT_TELEMETRY_DISABLED=1 npm run build
          cd ..
          if [ -d "frontend/public" ]; then
            tar -czf frontend-build.tar.gz -C frontend .next public package.json package-lock.json
          else
            tar -czf frontend-build.tar.gz -C frontend .next package.json package-lock.json
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 82.29.160.246 >> ~/.ssh/known_hosts

      - name: Upload Frontend Build to Server
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 frontend-build.tar.gz root@82.29.160.246:/root/AI-Automation/dev/

      - name: Deploy LIVE
        run: |
          ssh root@82.29.160.246 << 'EOF'
            set -e
            cd /root/AI-Automation/dev

            # Enable Swap if not already configured to prevent OOM / Broken pipe during Next.js build
            # Also ensure /sbin and /usr/sbin are in PATH for non-interactive SSH
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"

            # VPS Diagnostics - Write to frontend public directory to fetch via URL
            mkdir -p frontend/public
            echo "=== VPS PORT AND PROCESS DIAGNOSTICS ===" > frontend/public/nginx_config_debug.txt
            echo "PM2 Status:" >> frontend/public/nginx_config_debug.txt
            pm2 status >> frontend/public/nginx_config_debug.txt 2>&1 || true
            echo "Listening Ports:" >> frontend/public/nginx_config_debug.txt
            (ss -lptn || netstat -lptn) >> frontend/public/nginx_config_debug.txt 2>&1 || true
            echo "Nginx Configs:" >> frontend/public/nginx_config_debug.txt
            tail -n +1 /etc/nginx/sites-enabled/* >> frontend/public/nginx_config_debug.txt 2>&1 || true
            echo "=========================================" >> frontend/public/nginx_config_debug.txt
            cat frontend/public/nginx_config_debug.txt

            # Enable Swap if not already configured to prevent OOM / Broken pipe during Next.js build
            if [ "$(free | awk '/Swap:/ {print $2}')" -eq 0 ] 2>/dev/null; then
              echo "No swap space detected. Attempting to create a 2GB swap file..."
              (
                fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
                chmod 600 /swapfile
                mkswap /swapfile
                swapon /swapfile
                echo "/swapfile swap swap defaults 0 0" >> /etc/fstab
                echo "Swap file created and activated successfully."
              ) || echo "WARNING: Could not create swap file (this is normal if running inside a container like OpenVZ/LXC)."
            else
              echo "Swap space is already configured:"
              free -h
            fi

            # Safe function to kill processes on a port without killing PM2 daemon
            safe_kill_port() {
              local port=$1
              echo "Checking port $port..."
              local pids=""
              if command -v lsof >/dev/null 2>&1; then
                pids=$(lsof -t -i :$port 2>/dev/null || true)
              elif command -v fuser >/dev/null 2>&1; then
                pids=$(fuser $port/tcp 2>/dev/null || true)
              fi
              
              if [ -z "$pids" ]; then
                echo "No processes found on port $port."
                return 0
              fi
              
              for pid in $pids; do
                local cmd=""
                if [ -r /proc/$pid/cmdline ]; then
                  cmd=$(cat /proc/$pid/cmdline | tr '\0' ' ' 2>/dev/null || true)
                else
                  cmd=$(ps -p $pid -o cmd= 2>/dev/null || true)
                fi
                
                if echo "$cmd" | grep -qE "Daemon.js|God Daemon"; then
                  echo "Skipping PM2 daemon (PID: $pid, Command: $cmd) on port $port"
                else
                  echo "Killing process on port $port (PID: $pid, Command: $cmd)"
                  kill -9 $pid || true
                fi
              done
            }

            # Fetch latest remote changes
            git fetch origin

            # Identify which directories have changes before pulling
            PREV_COMMIT=$(git rev-parse HEAD || echo "")
            
            BACKEND_CHANGED=true
            FRONTEND_CHANGED=true
            ROOT_CHANGED=true

            if [ -n "$PREV_COMMIT" ]; then
              if git diff --name-only "$PREV_COMMIT" origin/main > /dev/null 2>&1; then
                # Check if backend directory has changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -E '^backend/' > /dev/null; then
                  BACKEND_CHANGED=true
                else
                  BACKEND_CHANGED=false
                fi

                # Check if frontend directory has changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -E '^frontend/' > /dev/null; then
                  FRONTEND_CHANGED=true
                else
                  FRONTEND_CHANGED=false
                fi

                # Check if root directory files (outside backend/ and frontend/) have changes
                if git diff --name-only "$PREV_COMMIT" origin/main | grep -v -E '^(backend/|frontend/)' > /dev/null; then
                  ROOT_CHANGED=true
                else
                  ROOT_CHANGED=false
                fi
              fi
            fi

            echo "=== CHANGE ANALYSIS ==="
            echo "Backend Changed:  $BACKEND_CHANGED"
            echo "Frontend Changed: $FRONTEND_CHANGED"
            echo "Root Changed:     $ROOT_CHANGED"
            echo "======================="

            # Checkout and pull the latest code
            git checkout main
            git pull origin main

            # Extract the pre-built frontend files (overwriting .next, public, package.json)
            echo "Extracting frontend build..."
            tar -xzf frontend-build.tar.gz -C frontend && rm -f frontend-build.tar.gz || { rm -f frontend-build.tar.gz; exit 1; }

            # 1. Handle Root Changes (If root files like package.json change)
            if [ "$ROOT_CHANGED" = "true" ]; then
              echo "Root files changed. Running npm install in root workspace..."
              npm install
            fi

            # 2. Handle Backend Changes
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$ROOT_CHANGED" = "true" ]; then
              echo "Deploying Backend changes..."
              npm install --prefix backend
              pm2 delete AI-Automation-Backend || true
              pm2 delete AI-Automation-Worker || true
              safe_kill_port 5005
              safe_kill_port 5006
              pm2 start ecosystem.config.js --only AI-Automation-Backend,AI-Automation-Worker
            else
              echo "No Backend changes detected. Skipping Backend deployment."
            fi

            # 3. Handle Frontend Changes (Pre-built on runner, only install runtime production deps and restart)
            if [ "$FRONTEND_CHANGED" = "true" ] || [ "$ROOT_CHANGED" = "true" ]; then
              echo "Deploying Frontend changes..."
              npm install --prefix frontend --omit=dev
              pm2 delete AI-Automation-FE || true
              safe_kill_port 3000
              pm2 start ecosystem.config.js --only AI-Automation-FE
              
              # Clear Nginx reverse proxy cache if enabled and reload Nginx
              echo "Clearing Nginx cache..."
              rm -rf /var/cache/nginx/* || true
              systemctl reload nginx || service nginx reload || true

              # Diagnostic outputs
              echo "=== DIAGNOSTICS ===" > nginx_config_debug.txt
              echo "PM2 Status:" >> nginx_config_debug.txt
              pm2 status >> nginx_config_debug.txt
              echo "Next.js process port status:" >> nginx_config_debug.txt
              (ss -lptn || netstat -lptn) >> nginx_config_debug.txt 2>&1 || true
              echo "Nginx proxy cache settings:" >> nginx_config_debug.txt
              grep -R "proxy_cache" /etc/nginx/ >> nginx_config_debug.txt 2>&1 || true
              echo "Checking Nginx configurations for directories:" >> nginx_config_debug.txt
              (grep -R "alias" /etc/nginx/sites-enabled/ || grep -R "root" /etc/nginx/sites-enabled/) >> nginx_config_debug.txt 2>&1 || true
              echo "Showing Nginx server block configs:" >> nginx_config_debug.txt
              cat /etc/nginx/sites-enabled/* >> nginx_config_debug.txt 2>&1 || true
              echo "===================" >> nginx_config_debug.txt
              # Copy diagnostics file to backend uploads folder to retrieve it via URL
              mkdir -p backend/uploads
              cp nginx_config_debug.txt backend/uploads/nginx_config_debug.txt
            else
              echo "No Frontend changes detected. Skipping Frontend deployment."
            fi
          EOF

      - name: Fetch VPS Diagnostics
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 root@82.29.160.246 << 'EOF'
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
            cd /root/AI-Automation/dev
            echo "=== PM2 STATUS ===" > debug_vps_status.txt
            pm2 status >> debug_vps_status.txt 2>&1 || true
            echo "=== PM2 FE LOGS ===" >> debug_vps_status.txt
            pm2 logs AI-Automation-FE --lines 100 --nostream >> debug_vps_status.txt 2>&1 || true
            echo "=== PM2 BACKEND LOGS ===" >> debug_vps_status.txt
            pm2 logs AI-Automation-Backend --lines 100 --nostream >> debug_vps_status.txt 2>&1 || true
            echo "=== LISTENING PORTS ===" >> debug_vps_status.txt
            (ss -lptn || netstat -lptn) >> debug_vps_status.txt 2>&1 || true
            echo "=== NGINX CONFIGS ===" >> debug_vps_status.txt
            tail -n +1 /etc/nginx/sites-enabled/* >> debug_vps_status.txt 2>&1 || true
          EOF
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@82.29.160.246:/root/AI-Automation/dev/debug_vps_status.txt . || true

      - name: Upload Diagnostics Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-diagnostics
          path: debug_vps_status.txt

      - name: Clean up failed upload on Server
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 root@82.29.160.246 "rm -f /root/AI-Automation/dev/frontend-build.tar.gz; rm -f /root/AI-Automation/dev/debug_vps_status.txt"
