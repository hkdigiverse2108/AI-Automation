services:
  # 1. Web Service (Express API)
  - type: web
    name: wa-backend-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: RUN_QUEUE_PROCESSORS
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generate: true
      - key: REFRESH_TOKEN_SECRET
        generate: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: dhj4gacsd
      - key: CLOUDINARY_API_KEY
        value: "862131536574818"
      - key: CLOUDINARY_API_SECRET
        value: BHgUgKtzeI6A_hd5FgtF6Liz7VU

  # 2. Background Worker (Bull queue campaign processor)
  - type: worker
    name: wa-backend-worker
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_QUEUE_PROCESSORS
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
